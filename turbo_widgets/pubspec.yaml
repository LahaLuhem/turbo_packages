name: turbo_widgets
description: Common reusable UI widgets, extensions, and animation utilities for Flutter.
version: 1.2.0
resolution: workspace
repository: https://github.com/appboypov/turbo_packages/tree/main/turbo_widgets
homepage: https://github.com/appboypov/turbo_packages
issue_tracker: https://github.com/appboypov/turbo_packages/issues

topics:
  - widgets
  - flutter
  - ui
  - animations
  - layout

environment:
  sdk: ^3.10.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  get_it: ^9.2.1
  turbo_mvvm: ^1.2.0
  turbo_notifiers: ^1.1.0
  turbolytics: ^1.1.0
  shadcn_ui: ^0.53.5

  turbo_forms: ^1.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.1.0
  coverage: ^1.15.0

flutter:
  uses-material-design: true
